<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World 演示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            padding: 48px 40px;
            max-width: 520px;
            width: 100%;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .container:hover {
            transform: translateY(-4px);
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 14px;
            color: #888;
            margin-bottom: 32px;
        }

        .divider {
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 2px;
            margin: 0 auto 32px;
        }

        .message-area {
            background: #f8f9ff;
            border: 1px solid #e8eaff;
            border-radius: 12px;
            padding: 28px 24px;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
        }

        .message-text {
            font-size: 22px;
            font-weight: 600;
            color: #333;
        }

        .message-text.loading {
            color: #999;
            font-weight: 400;
            font-size: 16px;
        }

        .message-text.error {
            color: #e74c3c;
        }

        .message-text.success {
            color: #27ae60;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            color: #aaa;
            padding-top: 16px;
            border-top: 1px solid #eee;
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
            animation: pulse 1.5s infinite;
        }

        .status-dot.connected {
            background: #27ae60;
            animation: none;
        }

        .status-dot.disconnected {
            background: #e74c3c;
            animation: none;
        }

        .status-dot.loading {
            background: #f39c12;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .retry-btn {
            background: none;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 8px 16px;
            font-size: 13px;
            color: #666;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .retry-btn:hover {
            background: #667eea;
            color: #fff;
            border-color: #667eea;
        }

        .retry-btn.hidden {
            display: none;
        }

        .footer {
            margin-top: 24px;
            font-size: 12px;
            color: #bbb;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌐 Hello World</h1>
        <p class="subtitle">前端 + 后端 API 协作演示</p>
        <div class="divider"></div>

        <div class="message-area">
            <div id="message" class="message-text loading">正在连接服务器...</div>
        </div>

        <div class="status-bar">
            <span>
                <span id="statusDot" class="status-dot loading"></span>
                <span id="statusText">请求中...</span>
            </span>
            <button id="retryBtn" class="retry-btn hidden" onclick="fetchMessage()">🔄 重试</button>
        </div>

        <div class="footer">
            调用接口: <code>/api/hello</code>
        </div>
    </div>

    <script>
        async function fetchMessage() {
            const messageEl = document.getElementById('message');
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            const retryBtn = document.getElementById('retryBtn');

            // 重置状态
            messageEl.className = 'message-text loading';
            messageEl.textContent = '正在连接服务器...';
            statusDot.className = 'status-dot loading';
            statusText.textContent = '请求中...';
            retryBtn.classList.add('hidden');

            try {
                const response = await fetch('/api/hello');

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();

                // 成功显示消息
                messageEl.textContent = data.message || JSON.stringify(data);
                messageEl.className = 'message-text success';
                statusDot.className = 'status-dot connected';
                statusText.textContent = '已连接 ✓';
            } catch (err) {
                // 显示错误
                messageEl.textContent = `⚠️ 请求失败: ${err.message}`;
                messageEl.className = 'message-text error';
                statusDot.className = 'status-dot disconnected';
                statusText.textContent = '连接失败';
                retryBtn.classList.remove('hidden');
            }
        }

        // 页面加载自动调用
        window.addEventListener('DOMContentLoaded', fetchMessage);
    </script>
</body>
</html>
